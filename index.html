.splash{
  position:fixed;inset:0;z-index:1000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:linear-gradient(145deg,#0A0F1E 0%,#0D2140 50%,#0A1628 100%);
  transition:opacity .7s ease,transform .7s ease;
}
.splash.exit{opacity:0;transform:scale(1.06);filter:blur(4px);pointer-events:none}
.splash-logo{
  width:110px;height:110px;
  background:linear-gradient(135deg,#0A84FF,#5AC8FA);
  border-radius:28px;display:flex;align-items:center;justify-content:center;
  font-size:50px;
  box-shadow:0 0 60px rgba(10,132,255,.5),0 0 120px rgba(10,132,255,.2);
  animation:logoPulse 2s ease-in-out infinite;margin-bottom:24px;
}
@keyframes logoPulse{
  0%,100%{transform:scale(1);box-shadow:0 0 60px rgba(10,132,255,.5),0 0 120px rgba(10,132,255,.2)}
  50%{transform:scale(1.04);box-shadow:0 0 80px rgba(10,132,255,.7),0 0 160px rgba(10,132,255,.3)}
}
.splash-typing{display:flex;flex-direction:column;align-items:center;gap:4px;min-height:100px;margin-bottom:36px}
.splash-line{font-size:26px;font-weight:500;letter-spacing:1px;color:rgba(255,255,255,.7);height:34px;white-space:nowrap}
.splash-line.highlight{font-size:36px;font-weight:700;letter-spacing:-.5px;background:linear-gradient(135deg,#fff 0%,rgba(90,200,250,.9) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.splash-cursor{display:inline-block;font-weight:300;color:#5AC8FA;-webkit-text-fill-color:#5AC8FA;width:2px;animation:cursorBlink .6s step-end infinite}
@keyframes cursorBlink{0%,100%{opacity:1}50%{opacity:0}}
.splash-loader{width:200px;height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
.splash-loader-bar{height:100%;background:linear-gradient(90deg,#0A84FF,#5AC8FA);border-radius:2px;width:0%}
.splash-skip{
  position:absolute;top:40px;right:24px;z-index:10;
  font-size:13px;font-weight:600;letter-spacing:1px;
  color:rgba(255,255,255,.5);cursor:pointer;
  padding:8px 16px;border-radius:20px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.15);
  transition:all .25s;
}
.splash-skip:hover{background:rgba(255,255,255,.15);color:#fff;transform:scale(1.04)}
.splash-sig{position:absolute;bottom:40px;font-size:13px;color:rgba(255,255,255,.4);letter-spacing:2px;text-transform:uppercase}

.main-home{
  position:relative;z-index:1;height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px;opacity:0;transition:opacity .6s ease;
}
.main-home.visible{opacity:1}
.main-home-title{text-align:center;margin-bottom:28px}
.main-home-title h1{
  font-size:38px;font-weight:800;letter-spacing:-1px;margin-bottom:8px;
  background:linear-gradient(135deg,#fff 0%,rgba(90,200,250,.9) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.main-home-title p{font-size:14px;color:rgba(255,255,255,.5);letter-spacing:1px;text-transform:uppercase}
.home-cards{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;max-width:720px}
.home-card{
  flex:1;min-width:200px;max-width:280px;
  padding:28px 22px;border-radius:20px;cursor:pointer;overflow:hidden;
  background:rgba(255,255,255,.06);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.15);
  box-shadow:0 8px 32px rgba(0,0,0,.25);
  transition:transform .3s cubic-bezier(.34,1.56,.64,1),box-shadow .3s;
  text-align:center;position:relative;will-change:transform;
  animation:cardIn .5s cubic-bezier(.22,1,.36,1) both;
}
.home-card:nth-child(1){animation-delay:.1s}
.home-card:nth-child(2){animation-delay:.18s}
.home-card:nth-child(3){animation-delay:.26s}
@keyframes cardIn{from{opacity:0;transform:translateY(30px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
.home-card:hover{transform:translateY(-5px) scale(1.02);box-shadow:0 16px 48px rgba(0,0,0,.4)}
.home-card:active{transform:scale(.97)}
.home-card::before{content:'';position:absolute;inset:0;background:var(--accent);opacity:.08;border-radius:inherit}
.home-card.bible{--accent:linear-gradient(135deg,#0A84FF,#5AC8FA)}
.home-card.hymns{--accent:linear-gradient(135deg,#FF9F0A,#FF6B6B)}
.home-card.sabata{--accent:linear-gradient(135deg,#34C759,#5AC8FA)}
.hc-icon{font-size:44px;margin-bottom:12px}
.hc-title{font-size:20px;font-weight:700;margin-bottom:4px}
.hc-sub{font-size:13px;color:rgba(255,255,255,.5);margin-bottom:12px}
.hc-badge{
  display:inline-block;padding:4px 12px;border-radius:10px;font-size:12px;font-weight:600;
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.12);
}
.home-sig{position:absolute;bottom:24px;font-size:11px;color:rgba(255,255,255,.3);letter-spacing:2px;text-transform:uppercase}
.home-visit{position:absolute;bottom:52px;font-size:12px;color:rgba(255,255,255,.45);text-align:center;padding:0 24px;max-width:600px;line-height:1.5;letter-spacing:.3px}

.bg-canvas{
  position:fixed;inset:0;z-index:0;
  background:radial-gradient(ellipse 80% 60% at 20% 10%,rgba(10,132,255,.35) 0%,transparent 60%),
    radial-gradient(ellipse 60% 80% at 80% 80%,rgba(90,200,250,.2) 0%,transparent 60%),
    radial-gradient(ellipse 50% 50% at 60% 30%,rgba(52,199,89,.1) 0%,transparent 50%),
    linear-gradient(160deg,#0A0F1E 0%,#0D1B2A 40%,#0A1628 100%);
  animation:bgPulse 12s ease-in-out infinite alternate;

.slideshow{
  position:fixed;inset:0;z-index:2000;
  opacity:0;pointer-events:none;
  transition:opacity .5s ease;
}
.slideshow.open{opacity:1;pointer-events:all}

.slide{
  position:absolute;inset:0;z-index:1;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background-size:cover;background-position:center;background-repeat:no-repeat;
  opacity:0;padding:40px 24px;pointer-events:none;
}
.slide.active{z-index:2;opacity:1;pointer-events:all}
.slide.exit{z-index:3;pointer-events:none}
/* Enter transitions */
.slide.enter-fade{animation:fadeIn .6s ease both}
.slide.enter-zoomIn{animation:zoomIn .7s cubic-bezier(.22,1,.36,1) both}
.slide.enter-zoomOut{animation:zoomOut .7s cubic-bezier(.22,1,.36,1) both}
.slide.enter-slideLeft{animation:slideInRight .6s ease both}
.slide.enter-slideRight{animation:slideInLeft .6s ease both}
.slide.enter-blur{animation:blurIn .7s ease both}
.slide.enter-rotate{animation:rotateIn .8s cubic-bezier(.22,1,.36,1) both}
.slide.enter-flip{animation:flipIn .7s ease both}
/* Exit transitions */
.slide.exit-fade{animation:fadeOut .5s ease both}
.slide.exit-zoomIn{animation:fadeOut .4s ease both}
.slide.exit-zoomOut{animation:zoomOutBig .6s ease both}
.slide.exit-slideLeft{animation:slideOutLeft .5s ease both}
.slide.exit-slideRight{animation:slideOutRight .5s ease both}
.slide.exit-blur{animation:blurOut .5s ease both}
.slide.exit-rotate{animation:rotateOut .6s ease both}
.slide.exit-flip{animation:flipOut .5s ease both}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeOut{from{opacity:1}to{opacity:0}}
@keyframes zoomIn{from{opacity:0;transform:scale(1.4)}to{opacity:1;transform:scale(1)}}
@keyframes zoomOut{from{opacity:0;transform:scale(.6)}to{opacity:1;transform:scale(1)}}
@keyframes zoomOutBig{from{opacity:1;transform:scale(1)}to{opacity:0;transform:scale(1.5)}}
@keyframes slideInRight{from{opacity:0;transform:translateX(120px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideOutLeft{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(-120px)}}
@keyframes slideInLeft{from{opacity:0;transform:translateX(-120px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideOutRight{from{opacity:1;transform:translateX(0)}to{opacity:0;transform:translateX(120px)}}
@keyframes blurIn{from{opacity:0;filter:blur(24px)}to{opacity:1;filter:blur(0)}}
@keyframes blurOut{from{opacity:1;filter:blur(0)}to{opacity:0;filter:blur(24px)}}
@keyframes rotateIn{from{opacity:0;transform:rotate(-12deg) scale(.8)}to{opacity:1;transform:rotate(0) scale(1)}}
@keyframes rotateOut{from{opacity:1;transform:rotate(0) scale(1)}to{opacity:0;transform:rotate(12deg) scale(.8)}}
@keyframes flipIn{from{opacity:0;transform:perspective(800px) rotateY(90deg)}to{opacity:1;transform:rotateY(0)}}
@keyframes flipOut{from{opacity:1;transform:perspective(800px) rotateY(0)}to{opacity:0;transform:rotateY(-90deg)}}
@keyframes slideContentIn{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

  /* ÃƒÆ’Ã†â€™Ãƒâ€ Ã¢â‚¬â„¢ÃƒÆ’Ã¢â‚¬Â ÃƒÂ¢Ã¢â€šÂ¬Ã¢â€žÂ¢ÃƒÆ’Ã†â€™ÃƒÂ¢Ã¢â€šÂ¬Ã…Â¡ÃƒÆ’Ã¢â‚¬Å¡Ãƒâ€šÃ‚Â¢ÃƒÆ’Ã†â€™Ãƒâ€ Ã¢â‚¬â„¢ÃƒÆ’Ã¢â‚¬Å¡Ãƒâ€šÃ‚Â¢ÃƒÆ’Ã†â€™Ãƒâ€šÃ‚Â¢ÃƒÆ’Ã‚Â¢ÃƒÂ¢Ã¢â‚¬Å¡Ã‚Â¬Ãƒâ€¦Ã‚Â¡ÃƒÆ’Ã¢â‚¬Å¡Ãƒâ€šÃ‚Â¬ÃƒÆ’Ã†â€™ÃƒÂ¢Ã¢â€šÂ¬Ã…Â¡ÃƒÆ’Ã¢â‚¬Å¡Ãƒâ€šÃ‚ÂÃƒÆ’Ã†â€™Ãƒâ€ Ã¢â‚¬â„¢ÃƒÆ’Ã¢â‚¬Å¡Ãƒâ€šÃ‚Â¢ÃƒÆ’Ã†â€™Ãƒâ€šÃ‚Â¢ÃƒÆ’Ã‚Â¢ÃƒÂ¢Ã¢â€šÂ¬Ã…Â¡Ãƒâ€šÃ‚Â¬ÃƒÆ’Ã¢â‚¬Â¦Ãƒâ€šÃ‚Â¡ÃƒÆ’Ã†â€™ÃƒÂ¢Ã¢â€šÂ¬Ã…Â¡ÃƒÆ’Ã¢â‚¬Å¡Ãƒâ€šÃ‚Â¬ÃƒÆ’Ã†â€™Ãƒâ€ Ã¢â‚¬â„¢ÃƒÆ’Ã¢â‚¬Â ÃƒÂ¢Ã¢â€šÂ¬Ã¢â€žÂ¢ÃƒÆ’Ã†â€™ÃƒÂ¢Ã¢â€šÂ¬Ã…Â¡ÃƒÆ’Ã¢â‚¬Å¡Ãƒâ€šÃ‚Â¢ÃƒÆ’Ã†â€™Ãƒâ€ Ã¢â‚¬â„¢ÃƒÆ’Ã¢â‚¬Å¡Ãƒâ€šÃ‚Â¢ÃƒÆ’Ã†â€™Ãƒâ€šÃ‚Â¢ÃƒÆ’Ã‚Â¢ÃƒÂ¢Ã¢â‚¬Å¡Ã‚Â¬Ãƒâ€¦Ã‚Â¡ÃƒÆ’Ã¢â‚¬Å¡Ãƒâ€šÃ‚Â¬ÃƒÆ’Ã†â€™ÃƒÂ¢Ã¢â€šÂ¬Ã…Â¡ÃƒÆ’Ã¢â‚¬Å¡Ãƒâ€šÃ‚ÂÃƒÆ’Ã†â€™Ãƒâ€ Ã¢â‚¬â„¢ÃƒÆ’Ã¢â‚¬Å¡Ãƒâ€šÃ‚Â¢ÃƒÆ’Ã†â€™Ãƒâ€šÃ‚Â¢ÃƒÆ’Ã‚Â¢ÃƒÂ¢Ã¢â€šÂ¬Ã…Â¡Ãƒâ€šÃ‚Â¬ÃƒÆ’Ã¢â‚¬Â¦Ãƒâ€šÃ‚Â¡ÃƒÆ’Ã†â€™ÃƒÂ¢Ã¢â€šÂ¬Ã…Â¡ÃƒÆ’Ã¢â‚¬Å¡Ãƒâ€šÃ‚Â¬ SLIDESHOW ÃƒÆ’Ã†â€™Ãƒâ€ Ã¢â‚¬â„¢ÃƒÆ’Ã¢â‚¬Â ÃƒÂ¢Ã¢â€šÂ¬Ã¢â€žÂ¢ÃƒÆ’Ã†â€™ÃƒÂ¢Ã¢â€šÂ¬Ã…Â¡ÃƒÆ’Ã¢â‚¬Å¡Ãƒâ€šÃ‚Â¢ÃƒÆ’Ã†â€™Ãƒâ€ Ã¢â‚¬â„¢ÃƒÆ’Ã¢â‚¬Å¡Ãƒâ€šÃ‚Â¢ÃƒÆ’Ã†â€™Ãƒâ€šÃ‚Â¢ÃƒÆ’Ã‚Â¢ÃƒÂ¢Ã¢â‚¬Å¡Ã‚Â¬Ãƒâ€¦Ã‚Â¡ÃƒÆ’Ã¢â‚¬Å¡Ãƒâ€šÃ‚Â¬ÃƒÆ’Ã†â€™ÃƒÂ¢Ã¢â€šÂ¬Ã…Â¡ÃƒÆ’Ã¢â‚¬Å¡Ãƒâ€šÃ‚ÂÃƒÆ’Ã†â€™Ãƒâ€ Ã¢â‚¬â„¢ÃƒÆ’Ã¢â‚¬Å¡Ãƒâ€šÃ‚Â¢ÃƒÆ’Ã†â€™Ãƒâ€šÃ‚Â¢ÃƒÆ’Ã‚Â¢ÃƒÂ¢Ã¢â€šÂ¬Ã…Â¡Ãƒâ€šÃ‚Â¬ÃƒÆ’Ã¢â‚¬Â¦Ãƒâ€šÃ‚Â¡ÃƒÆ’Ã†â€™ÃƒÂ¢Ã¢â€šÂ¬Ã…Â¡ÃƒÆ’Ã¢â‚¬Å¡Ãƒâ€šÃ‚Â¬ÃƒÆ’Ã†â€™Ãƒâ€ Ã¢â‚¬â„¢ÃƒÆ’Ã¢â‚¬Â ÃƒÂ¢Ã¢â€šÂ¬Ã¢â€žÂ¢ÃƒÆ’Ã†â€™ÃƒÂ¢Ã¢â€šÂ¬Ã…Â¡ÃƒÆ’Ã¢â‚¬Å¡Ãƒâ€šÃ‚Â¢ÃƒÆ’Ã†â€™Ãƒâ€ Ã¢â‚¬â„¢ÃƒÆ’Ã¢â‚¬Å¡Ãƒâ€šÃ‚Â¢ÃƒÆ’Ã†â€™Ãƒâ€šÃ‚Â¢ÃƒÆ’Ã‚Â¢ÃƒÂ¢Ã¢â‚¬Å¡Ã‚Â¬Ãƒâ€¦Ã‚Â¡ÃƒÆ’Ã¢â‚¬Å¡Ãƒâ€šÃ‚Â¬ÃƒÆ’Ã†â€™ÃƒÂ¢Ã¢â€šÂ¬Ã…Â¡ÃƒÆ’Ã¢â‚¬Å¡Ãƒâ€šÃ‚ÂÃƒÆ’Ã†â€™Ãƒâ€ Ã¢â‚¬â„¢ÃƒÆ’Ã¢â‚¬Å¡Ãƒâ€šÃ‚Â¢ÃƒÆ’Ã†â€™Ãƒâ€šÃ‚Â¢ÃƒÆ’Ã‚Â¢ÃƒÂ¢Ã¢â€šÂ¬Ã…Â¡Ãƒâ€šÃ‚Â¬ÃƒÆ’Ã¢â‚¬Â¦Ãƒâ€šÃ‚Â¡ÃƒÆ’Ã†â€™ÃƒÂ¢Ã¢â€šÂ¬Ã…Â¡ÃƒÆ’Ã¢â‚¬Å¡Ãƒâ€šÃ‚Â¬ */
  window.openSlides=function(){
    isPlaying=false;
    try{var saved=parseInt(localStorage.getItem('sabataSlide'));currentSlide=(!isNaN(saved)&&saved>=0&&saved<slides.length)?saved:0}catch(e){currentSlide=0}
    if(slideShowEl){slideShowEl.remove();slideShowEl=null}
    slideShowEl=document.createElement('div');slideShowEl.className='slideshow';

    let slidesHTML='';
    slides.forEach((s,i)=>{
      let inner=`<div class="slide-content">`;
      if(s.timer){
        const m=Math.floor(s.timer/60),sec=s.timer%60;
        inner+=`<h1>${s.title}</h1><div class="sub">${s.sub}</div>
          <div class="timer" id="timer${i}">${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}</div>
          <div class="timer-bar-wrap"><div class="timer-bar" id="timerBar${i}"></div></div>`;
      } else {
        inner+=`<h1>${s.title}</h1><div class="sub">${s.sub}</div>`;
      }
      inner+=`<div class="slide-signature">FIANGONANA ADVANTISTA AMBOLOKANDRINA</div></div><div class="number">${String(s.id).padStart(2,'0')} / 16</div>`;
      slidesHTML+=`<div class="slide${i===0?' active':''}" id="slide${i}" style="background-image:url('${s.bg}')">${inner}<img class="slide-logo" src="logoslide.png" alt=""></div>`;
    });

    slideShowEl.innerHTML=`
      <button class="slide-close" onclick="closeSlides()" aria-label="Hidy">&#x2716;</button>
      <div class="slide-hint" id="slideHint">&#x2190; &#x2192; na swipe &#x2022; Espace: lecture auto &#x2022; Esc: hivoaka</div>
      ${slidesHTML}
      <div class="slide-controls">
        <div class="ctrl-row">
          <button class="ctrl-btn" onclick="prevSlide()" aria-label="Teo aloha">&#x25C0;</button>
          <button class="play-btn" id="playBtn" onclick="togglePlay()" aria-label="Lalao / Hijanona">&#x25B6;</button>
          <button class="ctrl-btn" onclick="nextSlide()" aria-label="Manaraka">&#x25B6;</button>
          <div class="ctrl-progress" onclick="seekSlide(event)"><div class="ctrl-progress-fill" id="progressFill"></div></div>
          <div class="ctrl-label" id="ctrlLabel">01 / 16</div>
          <button class="ctrl-btn exit" onclick="closeSlides()" aria-label="Hivoaka">&#x2716;</button>
        </div>
      </div>
    `;
    document.body.appendChild(slideShowEl);
    requestAnimationFrame(()=>slideShowEl.classList.add('open'));
    try{if(!localStorage.getItem('hintShown')){localStorage.setItem('hintShown','1');setTimeout(function(){var h=document.getElementById('slideHint');if(h)h.classList.add('hide')},4000)}}catch(e){}
    try{if(document.documentElement.requestFullscreen&&!document.fullscreenElement)document.documentElement.requestFullscreen()}catch(e){}

    timerDisplay=document.getElementById('timer0');
    timerBar=document.getElementById('timerBar0');
    progressFill=document.getElementById('progressFill');
    labelEl=document.getElementById('ctrlLabel');
    playBtn=document.getElementById('playBtn');
    updateControls();
    resetHideTimer();
    sigIdx=0;if(sigTimer)clearInterval(sigTimer);
    sigTimer=setInterval(function(){
      sigIdx=(sigIdx+1)%sigTexts.length;
      document.querySelectorAll('.slide-signature').forEach(function(el){
        el.style.opacity='0';el.style.transform='translateX(-50%) translateY(8px)';
        setTimeout(function(){
          el.textContent=sigTexts[sigIdx];
          el.style.opacity='1';el.style.transform='translateX(-50%) translateY(0)';
        },400);
      });
    },5000);

  };

  let hideTimeout=null;
  function resetHideTimer(){
    if(!slideShowEl)return;
    const ctrl=slideShowEl.querySelector('.slide-controls');
    const close=slideShowEl.querySelector('.slide-close');
    if(ctrl)ctrl.style.opacity='1';if(close)close.style.opacity='1';
    if(hideTimeout)clearTimeout(hideTimeout);
    hideTimeout=setTimeout(()=>{
      if(!slideShowEl||!slideShowEl.classList.contains('open'))return;
      if(ctrl)ctrl.style.opacity='0';if(close)close.style.opacity='0';
    },2000);
  }

  document.addEventListener('keydown',function(e){
    if(!slideShowEl||!slideShowEl.classList.contains('open'))return;
    if(e.key==='ArrowRight'){nextSlide();resetHideTimer()}
    if(e.key==='ArrowLeft'){prevSlide();resetHideTimer()}
    if(e.key===' '||e.key==='Spacebar'){e.preventDefault();togglePlay();resetHideTimer()}
    if(e.key==='Escape'){closeSlides()}
  });

  document.addEventListener('mousemove',function(){
    if(!slideShowEl||!slideShowEl.classList.contains('open'))return;
    resetHideTimer();
  });

  var touchStartX=0,touchStartY=0;
  document.addEventListener('touchstart',function(e){
    if(!slideShowEl||!slideShowEl.classList.contains('open'))return;
    touchStartX=e.changedTouches[0].screenX;
    touchStartY=e.changedTouches[0].screenY;
  },{passive:true});
  document.addEventListener('touchend',function(e){
    if(!slideShowEl||!slideShowEl.classList.contains('open'))return;
    var dx=e.changedTouches[0].screenX-touchStartX;
    var dy=e.changedTouches[0].screenY-touchStartY;
    if(Math.abs(dx)>50&&Math.abs(dx)>Math.abs(dy)*1.5){
      if(dx<0){nextSlide()}else{prevSlide()}
      resetHideTimer();
    }
  },{passive:true});

  window.closeSlides=function(){
    try{localStorage.setItem('sabataSlide',currentSlide)}catch(e){}
    if(sigTimer){clearInterval(sigTimer);sigTimer=null}
    if(timerInterval){clearInterval(timerInterval);timerInterval=null}
    try{if(document.fullscreenElement)document.exitFullscreen()}catch(e){}
    slideShowEl.classList.remove('open');
    setTimeout(()=>{if(slideShowEl){slideShowEl.remove();slideShowEl=null}},500);
  };

  window.nextSlide=function(){
    if(currentSlide<slides.length-1){goTo(currentSlide+1)}
  };
  window.prevSlide=function(){
    if(currentSlide>0){goTo(currentSlide-1)}
  };
  window.seekSlide=function(e){
    const rect=e.currentTarget.getBoundingClientRect();
    const x=e.clientX-rect.left;
    const p=x/rect.width;
    const idx=Math.round(p*(slides.length-1));
    goTo(Math.max(0,Math.min(slides.length-1,idx)));
  };

  window.goTo=function goTo(idx){
    if(timerInterval){clearInterval(timerInterval);timerInterval=null;isPlaying=false;if(playBtn)playBtn.innerHTML='&#x25B6;'}
    if(currentSlide===idx)return;
    const oldEl=document.getElementById('slide'+currentSlide);
    const t=transTypes[transIdx%transTypes.length];transIdx++;
    const dir=idx>currentSlide?1:-1;
    oldEl.classList.remove('active');
    if(dir>0)oldEl.classList.add('exit','exit-'+t);
    else oldEl.classList.add('exit','exit-'+t);
    currentSlide=idx;
    const newEl=document.getElementById('slide'+currentSlide);
    newEl.classList.add('active');
    if(dir>0)newEl.classList.add('enter-'+t);
    else newEl.classList.add('enter-'+t);
    setTimeout(()=>{oldEl.classList.remove('exit','exit-'+t);newEl.classList.remove('enter-'+t)},800);
    timerDisplay=document.getElementById('timer'+currentSlide);
    timerBar=document.getElementById('timerBar'+currentSlide);
    updateControls();
    const s=slides[currentSlide];
    if(s.timer){
      timerRemaining=s.timer;
      setTimeout(()=>togglePlay(),300);
    }
    try{localStorage.setItem('sabataSlide',currentSlide)}catch(e){}
  }

  window.togglePlay=function(){
    const s=slides[currentSlide];
    if(!s.timer){return}
    if(timerInterval){clearInterval(timerInterval);timerInterval=null;isPlaying=false;playBtn.innerHTML='&#x25B6;';return}
    isPlaying=true;playBtn.innerHTML='&#x23F8;';
    if(timerRemaining<=0)timerRemaining=s.timer;
    timerInterval=setInterval(()=>{
      timerRemaining--;
      if(timerRemaining<=0){clearInterval(timerInterval);timerInterval=null;isPlaying=false;playBtn.innerHTML='&#x25B6;';timerRemaining=0}
      updateTimer();
    },1000);
  };

  function updateTimer(){
    if(!timerDisplay)return;
    const m=Math.floor(timerRemaining/60),sec=timerRemaining%60;
    timerDisplay.textContent=String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');
    timerDisplay.classList.remove('pop');
    void timerDisplay.offsetWidth;
    timerDisplay.classList.add('pop');
    if(timerBar){
      const s=slides[currentSlide];
      const p=s.timer?timerRemaining/s.timer*100:0;
      timerBar.style.width=p+'%';
    }
  }

  function updateControls(){
    if(progressFill)progressFill.style.width=((currentSlide+1)/slides.length*100)+'%';
    if(labelEl)labelEl.textContent=String(currentSlide+1).padStart(2,'0')+' / '+String(slides.length).padStart(2,'0');
    const s=slides[currentSlide];
    if(s.timer){
      timerRemaining=s.timer;
      if(timerDisplay){
        const m=Math.floor(s.timer/60),sec=s.timer%60;
        timerDisplay.textContent=String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');
      }
      if(timerBar)timerBar.style.width='100%';
      if(playBtn)playBtn.style.display='flex';
    } else {
      if(playBtn)playBtn.style.display='none';
    }
  }

  try{if(location.search.indexOf('slideshow')>=0){
    history.replaceState(null,'','index.html');
    var sp=document.querySelector('.splash');
    if(sp)sp.style.display='none';
    showHome();
    setTimeout(function(){if(typeof openSlides==='function')openSlides()},100);
  }else{setTimeout(typeNext,400)}
}catch(e){setTimeout(typeNext,400)}
})();
</script>
